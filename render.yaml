services:
  - type: web
    name: iron-requiem-remaster-server
    runtime: node
    plan: free
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: CLIENT_ORIGIN
        value: https://YOUR-NETLIFY-SITE.netlify.app
